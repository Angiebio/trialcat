# fly.toml app configuration file generated for trialcat on 2026-04-12T13:07:03-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trialcat'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_ENV = 'production'
  APP_PORT = '8000'
  DATABASE_URL = 'sqlite:////data/trialcat.db'
  LOG_LEVEL = 'INFO'

[[mounts]]
  source = 'trialcat_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
